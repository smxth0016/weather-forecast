services:
  - type: web
    name: atmos-intel
    env: python
    # Build command: Installs requirements for the backend
    buildCommand: "pip install -r backend/requirements.txt"
    # Start command: Uses gunicorn, changing directory to backend to find app.py
    startCommand: "gunicorn --chdir backend --timeout 120 app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /var/lib/weather_data/weather.db
    # Persistent Disk (Optional: Uncomment to use a paid Render Disk)
    # disk:
    #   name: weather-data
    #   mountPath: /var/lib/weather_data
    #   sizeGB: 1
